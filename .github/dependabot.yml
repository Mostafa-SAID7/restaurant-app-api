version: 2

updates:
  # .NET / NuGet: Professional maintenance
  - package-ecosystem: "nuget"
    directory: "/api"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 10
    versioning-strategy: "increase"
    rebase-strategy: "auto"
    labels:
      - "dependencies"
      - "dotnet"
      - "auto-merge" # Label for the auto-merge workflow
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions: Keep CI/CD tools up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github-actions"
      - "auto-merge"
    commit-message:
      prefix: "chore(ci)"
