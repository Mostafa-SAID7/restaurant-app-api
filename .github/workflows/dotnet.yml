name: 🏗️ .NET CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: 📦 Restore dependencies
        run: dotnet restore api/RestuarantAPI.csproj

      - name: 🔨 Build (Release)
        run: dotnet build api/RestuarantAPI.csproj --no-restore -c Release

      - name: ✅ Publish (verify output)
        run: dotnet publish api/RestuarantAPI.csproj --no-build -c Release -o ./publish
